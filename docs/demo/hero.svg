<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="820" height="440" fill="#f6f7f9"/>
  <g filter="url(#shadow)">
    <rect x="30" y="30" width="760" height="380" rx="10" fill="#1e1e2e"/>
    <rect x="30" y="30" width="760" height="34" rx="10" fill="#181825"/>
    <circle cx="52" cy="47" r="6" fill="#f38ba8"/>
    <circle cx="72" cy="47" r="6" fill="#f9e2af"/>
    <circle cx="92" cy="47" r="6" fill="#a6e3a1"/>
    <text x="410" y="51" text-anchor="middle" fill="#7f849c">sts-project-vector-email — demo</text>
  </g>
  <g fill="#cdd6f4">
    <text x="50" y="96"><tspan fill="#89b4fa">$</tspan> curl -sS -X POST localhost:3000/api/search \</text>
    <text x="50" y="116">    -H "Authorization: Bearer $TOKEN" \</text>
    <text x="50" y="136">    -d <tspan fill="#a6e3a1">'{"query":"what did Sarah send about the Q3 budget?","answer":true}'</tspan></text>
  </g>
  <g fill="#cdd6f4">
    <text x="50" y="172"><tspan fill="#f9e2af">{</tspan></text>
    <text x="66" y="192"><tspan fill="#89dceb">"answer"</tspan>: <tspan fill="#a6e3a1">"Sarah sent the revised Q3 budget on Aug 12. Key changes:</tspan></text>
    <text x="66" y="210"><tspan fill="#a6e3a1">  headcount frozen through Q4, marketing trimmed 15%, and a</tspan></text>
    <text x="66" y="228"><tspan fill="#a6e3a1">  new infra line item of $42k for the Pinecone migration."</tspan>,</text>
    <text x="66" y="252"><tspan fill="#89dceb">"hits"</tspan>: [</text>
    <text x="84" y="270"><tspan fill="#f9e2af">{</tspan> <tspan fill="#89dceb">"subject"</tspan>: <tspan fill="#a6e3a1">"Re: Q3 budget — revised"</tspan>, <tspan fill="#89dceb">"from"</tspan>: <tspan fill="#a6e3a1">"sarah@…"</tspan>, <tspan fill="#89dceb">"score"</tspan>: <tspan fill="#fab387">0.89</tspan> <tspan fill="#f9e2af">}</tspan>,</text>
    <text x="84" y="288"><tspan fill="#f9e2af">{</tspan> <tspan fill="#89dceb">"subject"</tspan>: <tspan fill="#a6e3a1">"Budget Q3 – heads up"</tspan>,       <tspan fill="#89dceb">"from"</tspan>: <tspan fill="#a6e3a1">"sarah@…"</tspan>, <tspan fill="#89dceb">"score"</tspan>: <tspan fill="#fab387">0.82</tspan> <tspan fill="#f9e2af">}</tspan></text>
    <text x="66" y="306">]</text>
    <text x="50" y="326"><tspan fill="#f9e2af">}</tspan></text>
  </g>
  <g fill="#6c7086">
    <text x="50" y="370">↳ hybrid search: 1536-d vector (openai) + lexical re-rank</text>
    <text x="50" y="388">↳ grounded answer synthesized by Claude, cites the hits it used</text>
  </g>
  <text x="770" y="396" text-anchor="end" fill="#6c7086" font-size="11">placeholder — regenerate via docs/demo/</text>
